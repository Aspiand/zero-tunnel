changelog:
  exclude:
    labels:
      - skip-changelog

  categories:
    - title: "Features"
      labels:
        - feat

    - title: "Bug Fixes"
      labels:
        - fix

    - title: "Documentation"
      labels:
        - docs

    - title: "Refactoring"
      labels:
        - refactor

    - title: "Testing"
      labels:
        - test

    - title: "Maintenance"
      labels:
        - chore
        - ci

    - title: "Dependencies"
      labels:
        - dependencies
